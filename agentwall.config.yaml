# Agentwall configuration example
# Copy to agentwall.config.yaml and customize

port: 3000
host: "127.0.0.1"
logLevel: "info"

approval:
  mode: "auto"
  timeoutMs: 30000
  backend: "file"
  persistencePath: "./agentwall-approvals.json"

policy:
  defaultDecision: "deny"
  # Optional external policy file. When present, Agentwall loads it at startup
  # and hot-reloads changes from disk while the service is running.
  configPath: "./policy.yaml"

dlp:
  enabled: true
  redactSecrets: true

egress:
  enabled: true
  defaultDeny: true
  allowPrivateRanges: false
  allowedHosts:
    - "api.openai.com"
  allowedSchemes:
    - "https"
  allowedPorts:
    - 443

manifestIntegrity:
  enabled: true
  # approvedHashesPath: "./approved-manifests.json"

watchdog:
  enabled: true
  staleAfterMs: 15000
  timeoutMs: 30000
  killSwitchMode: "deny_all"
